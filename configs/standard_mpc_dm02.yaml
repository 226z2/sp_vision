# Template config for running `standard_mpc` with io::Dm02Link (third_party/Communication)
# Usage:
#   ./build/standard_mpc @config-path=configs/standard_mpc_dm02.yaml

enemy_color: "red"

#####-----神经网络参数-----#####
yolo_name: yolov5
classify_model: assets/tiny_resnet.onnx
yolo11_model_path: assets/yolo11.xml
yolov8_model_path: assets/yolov8.xml
yolov5_model_path: assets/yolov5.xml
device: GPU
min_confidence: 0.8
use_traditional: true

#####-----ROI-----#####
roi:
  x: 420
  y: 50
  width: 600
  height: 600
use_roi: false

#####-----传统方法参数-----#####
threshold: 150
max_angle_error: 45
min_lightbar_ratio: 1.5
max_lightbar_ratio: 20
min_lightbar_length: 8
min_armor_ratio: 1
max_armor_ratio: 5
max_side_ratio: 1.5
max_rectangular_error: 25

#####-----tracker参数-----#####
min_detect_count: 5
max_temp_lost_count: 15
outpost_max_temp_lost_count: 75

#####-----aimer参数-----#####
yaw_offset: -2
pitch_offset: 0
comming_angle: 60
leaving_angle: 20
decision_speed: 8
high_speed_delay_time: 0.015
low_speed_delay_time: 0.015

#####-----shooter参数-----#####
first_tolerance: 3
second_tolerance: 2
judge_distance: 2
auto_fire: true

#####-----相机参数-----#####
camera_name: "hikrobot"
exposure_ms: 2
gain: 16
vid_pid: "2bdf:0001"

#####-----手眼/坐标系参数-----#####
R_gimbal2imubody: [1, 0, 0, 0, 1, 0, 0, 0, 1]

# Example intrinsics/extrinsics; replace with your calibration
camera_matrix: [1851.7070167840545, 0, 721.12585328714192, 0, 1851.8175594364079, 571.69879709276688, 0, 0, 1]
distort_coeffs: [-0.093662536083526302, 0.18945726820633155, -0.00040424349861928674, -0.0040568403852123142, 0]
R_camera2gimbal: [0.02823004230930648, -0.014076983590428133, 0.99950232778328707, -0.99954530259354468, -0.010995644138609872, 0.028076393521179785, 0.010594940981141165, -0.99984045444409364, -0.014380990321749998]
t_camera2gimbal: [0.045517325957791413, 0.10544338092767802, 0.034649710880185793]

#####-----DM-02 / MCU 通信（third_party/Communication）-----#####
# endpoint 优先级高于 com_port+dm02_baud。
# 典型：单片机 CDC ACM 设备是 /dev/ttyACM0
# 注意：你们 MCU 侧需要实现 DM-02 协议并上报 gimbal_state / tfmini / timesync 等。
dm02_endpoint: "serial:/dev/ttyACM0?baud=115200"
# dm02_baud: 115200  # 如果不写 dm02_endpoint，则用 com_port + dm02_baud 组合

# 当前 Dm02Link::mode() 由配置决定（协议里暂未上报 mode 字段）
dm02_mode: "AUTO_AIM"

# standard_mpc 需要弹速参与规划；如果 MCU 还没上报弹速，先用一个默认值跑通闭环
# 单位：m/s
dm02_bullet_speed_default: 10.0

#####-----planner-----#####
fire_thresh: 0.003
max_yaw_acc: 50
Q_yaw: [9e6, 0]
R_yaw: [1]
max_pitch_acc: 100
Q_pitch: [9e6, 0]
R_pitch: [1]

#####-----buff_detector参数-----#####
model: "assets/yolo11_buff_int8.xml"

#####-----buff_aimer参数-----#####
fire_gap_time: 0.520
predict_time: 0.100
